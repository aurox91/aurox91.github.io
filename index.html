<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshMarket · Tienda</title>
<!-- Meta Pixel Code -->
<script>

    <style>
        :root {
            --bg: #f4f6fb;
            --card: #ffffff;
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --accent: #16a34a;
            --accent-dark: #15803d;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .nav {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .dot { color: var(--primary); }

        .cart-btn {
            position: relative;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .cart-btn:hover { border-color: var(--primary); color: var(--primary); }

        .cart-count {
            background: var(--primary);
            color: #fff;
            border-radius: 999px;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            max-width: 1100px;
            margin: 0 auto;
            padding: 56px 24px 24px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin: 0 0 12px;
            background: linear-gradient(90deg, var(--primary), #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 18px;
            color: var(--muted);
            max-width: 560px;
            margin: 0 auto;
        }

        .grid {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
        }

        .thumb {
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            background: linear-gradient(135deg, #eef2ff, #e0f2fe);
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card h3 {
            margin: 0 0 4px;
            font-size: 17px;
            font-weight: 700;
        }

        .card .desc {
            font-size: 13px;
            color: var(--muted);
            margin: 0 0 14px;
            flex: 1;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn.add {
            background: #eef2ff;
            color: var(--primary);
        }
        .btn.add:hover { background: #e0e7ff; }

        .btn.buy {
            background: var(--accent);
            color: #fff;
        }
        .btn.buy:hover { background: var(--accent-dark); }

        /* Buy all banner */
        .buyall {
            max-width: 1100px;
            margin: 0 auto 64px;
            padding: 0 24px;
        }
        .buyall-inner {
            background: linear-gradient(120deg, var(--primary), #06b6d4);
            border-radius: 20px;
            padding: 32px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .buyall-inner h2 { margin: 0 0 6px; font-size: 24px; }
        .buyall-inner p { margin: 0; opacity: 0.9; }
        .btn-buyall {
            background: #fff;
            color: var(--primary);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-buyall:hover { transform: scale(1.04); }

        /* Cart drawer */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            z-index: 90;
        }
        .overlay.open { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 380px;
            max-width: 90vw;
            background: #fff;
            box-shadow: -10px 0 40px rgba(0,0,0,0.15);
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }
        .drawer.open { transform: translateX(0); }

        .drawer-head {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .drawer-head h2 { margin: 0; font-size: 20px; }
        .close-x {
            border: none;
            background: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--muted);
            line-height: 1;
        }

        .drawer-items {
            flex: 1;
            overflow-y: auto;
            padding: 12px 20px;
        }
        .empty { color: var(--muted); text-align: center; padding: 40px 0; }

        .line {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .line .ico { font-size: 28px; }
        .line .meta { flex: 1; }
        .line .meta strong { display: block; font-size: 14px; }
        .line .meta span { font-size: 13px; color: var(--muted); }
        .qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty button {
            width: 26px; height: 26px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
        }

        .drawer-foot {
            padding: 20px;
            border-top: 1px solid var(--border);
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 14px;
        }
        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-checkout:hover { background: var(--accent-dark); }
        .btn-checkout:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--text);
            color: #fff;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            z-index: 200;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <div class="nav">
            <div class="brand">🛒 Fresh<span class="dot">Market</span></div>
            <button class="cart-btn" onclick="openCart()">
                Carrito <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <h1>Productos frescos, al instante</h1>
        <p>Selección premium de frutas, verduras y básicos del super. Agrega al carrito o compra ahora.</p>
    </section>

    <main class="grid" id="grid"></main>

    <section class="buyall">
        <div class="buyall-inner">
            <div>
                <h2>¿Te llevas todo? 🧺</h2>
                <p>Compra el catálogo completo y ahorra tiempo. Dispara el evento custom <code>BuyAll</code>.</p>
            </div>
            <button class="btn-buyall" onclick="buyAll()">Comprar todo</button>
        </div>
    </section>

    <!-- Cart drawer -->
    <div class="overlay" id="overlay" onclick="closeCart()"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-head">
            <h2>Tu carrito</h2>
            <button class="close-x" onclick="closeCart()">&times;</button>
        </div>
        <div class="drawer-items" id="drawerItems"></div>
        <div class="drawer-foot">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn" onclick="checkout()">Iniciar checkout</button>
        </div>
    </aside>

    <div class="toast" id="toast"></div>

    <script>
        const CURRENCY = "USD";

        const PRODUCTS = [
            { id: "apple",      name: "Manzanas",        price: 10.00, emoji: "🍎", img: "apples.jpeg", desc: "Manzanas rojas frescas y crujientes, por kilo." },
            { id: "banana",     name: "Plátanos",        price: 6.50,  emoji: "🍌", desc: "Plátanos maduros y dulces, racimo de 1 kg." },
            { id: "strawberry", name: "Fresas",          price: 12.00, emoji: "🍓", desc: "Fresas seleccionadas, caja de 500 g." },
            { id: "grapes",     name: "Uvas",            price: 9.00,  emoji: "🍇", desc: "Uvas sin semilla, frescura garantizada." },
            { id: "orange",     name: "Naranjas",        price: 7.50,  emoji: "🍊", desc: "Naranjas jugosas para jugo, malla de 2 kg." },
            { id: "avocado",    name: "Aguacates",       price: 15.00, emoji: "🥑", desc: "Aguacates Hass en su punto, pack de 4." },
            { id: "tomato",     name: "Tomates",         price: 5.00,  emoji: "🍅", desc: "Tomate saladet maduro, por kilo." },
            { id: "carrot",     name: "Zanahorias",      price: 4.50,  emoji: "🥕", desc: "Zanahorias frescas y crujientes, 1 kg." },
            { id: "bread",      name: "Pan artesanal",   price: 8.00,  emoji: "🍞", desc: "Pan recién horneado, hogaza grande." },
            { id: "milk",       name: "Leche entera",    price: 3.50,  emoji: "🥛", desc: "Leche fresca pasteurizada, 1 litro." },
            { id: "cheese",     name: "Queso",           price: 18.00, emoji: "🧀", desc: "Queso madurado artesanal, 250 g." },
            { id: "eggs",       name: "Huevos",          price: 6.00,  emoji: "🥚", desc: "Huevos de gallina libre, docena." }
        ];

        const cart = {}; // id -> qty

        // ---- Render catálogo ----
        function money(n) { return "$" + n.toFixed(2) + " " + CURRENCY; }

        function renderGrid() {
            const grid = document.getElementById("grid");
            grid.innerHTML = PRODUCTS.map(p => `
                <article class="card">
                    <div class="thumb">${p.img ? `<img src="${p.img}" alt="${p.name}">` : p.emoji}</div>
                    <div class="card-body">
                        <h3>${p.name}</h3>
                        <p class="desc">${p.desc}</p>
                        <div class="price">${money(p.price)}</div>
                        <div class="actions">
                            <button class="btn add" onclick="addToCart('${p.id}')">Agregar</button>
                            <button class="btn buy" onclick="buyNow('${p.id}')">Comprar ahora</button>
                        </div>
                    </div>
                </article>
            `).join("");
        }

        function product(id) { return PRODUCTS.find(p => p.id === id); }

        // ---- Carrito ----
        function addToCart(id) {
            cart[id] = (cart[id] || 0) + 1;
            const p = product(id);
            fbq('track', 'AddToCart', {
                content_ids: [id],
                content_name: p.name,
                currency: CURRENCY,
                value: p.price
            });
            updateCart();
            toast(`${p.name} agregado al carrito`);
        }

        function removeOne(id) {
            if (!cart[id]) return;
            cart[id]--;
            if (cart[id] <= 0) delete cart[id];
            updateCart();
        }

        function cartTotal() {
            return Object.entries(cart).reduce((sum, [id, qty]) => sum + product(id).price * qty, 0);
        }

        function cartCount() {
            return Object.values(cart).reduce((a, b) => a + b, 0);
        }

        function updateCart() {
            document.getElementById("cartCount").textContent = cartCount();
            document.getElementById("cartTotal").textContent = money(cartTotal());
            document.getElementById("checkoutBtn").disabled = cartCount() === 0;

            const wrap = document.getElementById("drawerItems");
            const ids = Object.keys(cart);
            if (ids.length === 0) {
                wrap.innerHTML = `<div class="empty">Tu carrito está vacío 🛒</div>`;
                return;
            }
            wrap.innerHTML = ids.map(id => {
                const p = product(id);
                return `
                    <div class="line">
                        <span class="ico">${p.emoji}</span>
                        <div class="meta">
                            <strong>${p.name}</strong>
                            <span>${money(p.price)}</span>
                        </div>
                        <div class="qty">
                            <button onclick="removeOne('${id}')">−</button>
                            <span>${cart[id]}</span>
                            <button onclick="addToCart('${id}')">+</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        // ---- Compras (eventos pixel) ----
        function buyNow(id) {
            const p = product(id);
            fbq('track', 'Purchase', {
                content_ids: [id],
                content_name: p.name,
                currency: CURRENCY,
                value: p.price
            });
            toast(`¡Gracias por comprar ${p.name}!`);
        }

        function checkout() {
            const ids = Object.keys(cart);
            if (ids.length === 0) return;
            fbq('track', 'InitiateCheckout', {
                content_ids: ids,
                currency: CURRENCY,
                value: Number(cartTotal().toFixed(2)),
                num_items: cartCount()
            });
            toast("Iniciando checkout…");
        }

        function buyAll() {
            // Evento custom solicitado
            fbq('trackCustom', 'BuyAll', { action: 'click-buy-all' });
            // Además registramos la compra total
            fbq('track', 'Purchase', {
                content_ids: PRODUCTS.map(p => p.id),
                currency: CURRENCY,
                value: Number(PRODUCTS.reduce((s, p) => s + p.price, 0).toFixed(2)),
                num_items: PRODUCTS.length
            });
            toast("Evento BuyAll enviado al pixel ✅");
        }

        // ---- Drawer ----
        function openCart() {
            document.getElementById("drawer").classList.add("open");
            document.getElementById("overlay").classList.add("open");
        }
        function closeCart() {
            document.getElementById("drawer").classList.remove("open");
            document.getElementById("overlay").classList.remove("open");
        }

        // ---- Toast ----
        let toastTimer;
        function toast(msg) {
            const el = document.getElementById("toast");
            el.textContent = msg;
            el.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
        }

        // init
        renderGrid();
        updateCart();
    </script>

</body>
</html>
